<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Educational Data Archive</title>
    <style>
        body { background: #f0f2f5; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { text-align: center; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border: 1px solid #d1d9e0; }
        .btn { background: #006edc; color: white; border: none; padding: 15px 35px; font-size: 16px; border-radius: 6px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

<div class="card">
    <h2>Research Module 4.2</h2>
    <p>Connection verified. Click below to open the simulation database.</p>
    <button class="btn" onclick="launchSafe()">Open Database</button>
</div>

<script>
function launchSafe() {
    // 1. Open a new window
    var win = window.open('', '_blank');
    
    // 2. The URL: This searches DuckDuckGo for Roblox but uses 
    // "Safe Search" parameters to avoid being flagged as a game site
    var target = "https://duckduckgo.com/?q=Roblox+unblocked+66+ez&k1=-1&ko=-2&kz=-1&kac=-1";

    // 3. We use a 'meta refresh' to send the tab there. 
    // This often tricks "Ad Blocker" detectors because it looks like a browser redirect
    win.document.write(`
        <html>
        <head>
            <title>Loading Resource...</title>
            <meta http-equiv="refresh" content="0;url=${target}">
            <style>
                body { background: white; height: 100%; width: 100%; position: absolute; top: 0; left: 0; z-index: 9999; }
                /* This is your shield - it stays on top for 5 seconds to block the search bar */
                #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 130px; background: rgba(0,0,0,0); z-index: 10000; }
            </style>
        </head>
        <body>
            <div id="overlay"></div>
            <p style="font-family:sans-serif; text-align:center; margin-top:200px;">Synchronizing with Database...</p>
        </body>
        </html>
    `);
}
</script>

</body>
</html>
