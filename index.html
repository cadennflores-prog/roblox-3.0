<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Curriculum Resource Viewer</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #202124; font-family: 'Segoe UI', sans-serif; }
        
        /* The Browser Top Bar */
        .header {
            background: #35363a;
            height: 40px;
            display: flex;
            align-items: center;
            padding: 0 10px;
            border-bottom: 1px solid #1c1c1c;
        }

        .url-bar {
            background: #202124;
            color: #bdc1c6;
            font-size: 12px;
            padding: 5px 15px;
            border-radius: 15px;
            flex-grow: 1;
            margin: 0 10px;
            /* This is the key: it's not an input, so nobody can type! */
            user-select: none;
        }

        /* The Game Frame */
        iframe {
            width: 100%;
            height: calc(100% - 40px);
            border: none;
            background: #fff;
        }
    </style>
</head>
<body>

    <div class="header">
        <div style="display:flex; gap:5px;">
            <div style="width:10px; height:10px; border-radius:50%; background:#ff5f56;"></div>
            <div style="width:10px; height:10px; border-radius:50%; background:#ffbd2e;"></div>
            <div style="width:10px; height:10px; border-radius:50%; background:#27c93f;"></div>
        </div>
        <div class="url-bar">🔒 district-apps.internal/resource/simulation-v4</div>
    </div>

    <iframe src="https://nowgg.lol/play/roblox-corporation/1316/roblox"></iframe>

</body>
</html>
