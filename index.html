<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Academic Data Module</title>
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 320px; border: 1px solid #d1d9e0; }
        h2 { color: #1c1e21; margin-bottom: 10px; font-size: 20px; }
        p { color: #606770; font-size: 14px; margin-bottom: 30px; }
        
        .btn { 
            display: inline-block;
            background: #1877f2; 
            color: white; 
            text-decoration: none; 
            padding: 15px 25px; 
            border-radius: 8px; 
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
            width: 80%;
        }
        .btn:hover { background: #166fe5; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="card">
    <h2>Data Module 144</h2>
    <p>Press the button to initialize the secure remote simulation.</p>
    
    <a href="#" class="btn" onclick="autoLaunch()">INITIALIZE</a>
</div>

<script>
function autoLaunch() {
    // We use a Google Search URL parameter (?q=) to "auto-type" Roblox
    // and wrap it in Google Translate to bypass the school filter.
    const autoTypeLink = "https://translate.google.com/translate?sl=en&tl=es&u=https://www.google.com/search?q=roblox+now+gg+unblocked";
    
    // This renames your tab instantly
    document.title = "Classroom Data Feed";
    
    // Redirects the whole page to the "Pre-typed" search
    window.location.href = autoTypeLink;
}
</script>

</body>
</html>
