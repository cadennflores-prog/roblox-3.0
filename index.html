<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Academic Data Viewer</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; background: #333; }
        
        /* The Top Bar - Makes it look like a school document tool */
        .top-bar {
            height: 50px;
            background: #f1f1f1;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid #ccc;
            justify-content: space-between;
        }

        .status-light { color: #2ecc71; font-weight: bold; font-size: 14px; }
        .title { color: #555; font-size: 14px; font-weight: bold; }

        /* The Game Browser Window */
        #browser-frame {
            width: 100%;
            height: calc(100% - 50px);
            border: none;
            background: white;
        }

        /* Invisible Shield to lock the settings/top part of the game if needed */
        #shield {
            position: absolute;
            top: 50px;
            left: 0;
            width: 100%;
            height: 60px; /* Adjust if you want to block the top of the game */
            background: rgba(0,0,0,0);
            z-index: 10;
            display: none; /* Change to 'block' if you want it active */
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="title">Encrypted Research Module: #8841</div>
        <div class="status-light">● SECURE CONNECTION</div>
    </div>

    <div id="shield"></div>

    <iframe id="browser-frame" src="https://gd7playz.blogspot.com/2026/04/144.html"></iframe>

</body>
</html>
