<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Academic Research Portal</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; background: #202124; }
        
        /* The Fake Browser UI */
        .browser-header {
            background: #35363a;
            height: 45px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            border-bottom: 1px solid #1c1c1c;
        }

        .dots { display: flex; gap: 8px; margin-right: 20px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .red { background: #ff5f56; } .yellow { background: #ffbd2e; } .green { background: #27c93f; }

        /* The Locked Bar: It LOOKS like a URL bar but it's just a DIV (not an input) */
        .locked-url-bar {
            background: #202124;
            color: #9aa0a6;
            flex-grow: 1;
            height: 28px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            font-size: 13px;
            user-select: none; /* Prevents clicking or highlighting */
        }

        /* The Game Area */
        #app-frame {
            width: 100%;
            height: calc(100% - 45px);
            border: none;
            background: white;
        }
    </style>
</head>
<body>

    <div class="browser-header">
        <div class="dots">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
        </div>
        <div class="locked-url-bar">
            <span>🔒 secure-connection.internal/research-module-144</span>
        </div>
    </div>

    <iframe id="app-frame" src=""></iframe>

    <script>
        window.onload = function() {
            // This is the active now.gg mirror that usually allows embedding
            const secureLink = "https://geometry-spot.com/roblox/";
            document.getElementById('app-frame').src = secureLink;
            
            // Keeps the tab name stealthy
            document.title = "Research Asset #144";
        }
    </script>
</body>
</html>
