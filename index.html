<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Academic Research Portal</title>
    <link rel="icon" type="image/x-icon" href="https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png">
    <style>
        body { background: #f4f7f9; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { text-align: center; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); border: 1px solid #e1e4e8; width: 350px; }
        .launch-btn { background: #0366d6; color: white; border: none; padding: 14px 28px; font-size: 16px; border-radius: 6px; cursor: pointer; font-weight: 600; width: 100%; }
    </style>

<body>

<div class="container">
    <h2 style="color: #24292e;">Research Module 4.0</h2>
    <p style="color: #586069;">Authenticated Session: #7742. Click below to launch the simulation database.</p>
    
    <button class="launch-btn" onclick="launchGame()">Launch Simulation</button>
</div>

<script>
function launchGame() {
    // This is the specific link you found
    const gameUrl = "https://now.gg/apps/a/19900/b.html";

    // 1. CHANGE THE TAB NAME FIRST
    // This makes the tab say "Document" even while it's loading the game
    document.title = "Classroom Data Analysis";

    // 2. REDIRECT THE PAGE
    // By using 'location.replace', we bypass the "Refused to Connect" iframe error
    window.location.replace(gameUrl);
}
</script>
