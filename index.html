<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Academic Research Portal</title>
    <style>
        body { background: #f4f7f9; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { text-align: center; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); border: 1px solid #e1e4e8; width: 350px; }
        h2 { color: #24292e; margin-bottom: 10px; }
        p { color: #586069; font-size: 14px; margin-bottom: 25px; }
        .launch-btn { background: #0366d6; color: white; border: none; padding: 14px 28px; font-size: 16px; border-radius: 6px; cursor: pointer; font-weight: 600; width: 100%; }
        .launch-btn:hover { background: #0255b3; }
    </style>
</head>
<body>

<div class="container">
    <h2>Data Module 4.0</h2>
    <p>Access the cloud-based simulation database for your current assignment.</p>
    
    <button class="launch-btn" onclick="openNowGG()">Launch Simulation</button>
</div>

<script>
function openNowGG() {
    // This opens now.gg directly
    var gameUrl = "https://now.gg/apps/roblox-corporation/1316/roblox.html";
    
    // We open a new window
    var win = window.open('about:blank', '_blank');
    
    // We tell the new window to go to now.gg
    win.location.href = gameUrl;
    
    // This renames the tab at the top so it doesn't say "Roblox"
    win.document.title = "Student Research Viewer";
}
</script>

</body>
</html>
