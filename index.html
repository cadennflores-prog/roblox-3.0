<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Curriculum Research Tool</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #202124; font-family: sans-serif; }
        
        /* The Locked Bar (No Typing Allowed) */
        .app-header {
            background: #35363a;
            height: 40px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            color: #9aa0a6;
            font-size: 12px;
            border-bottom: 1px solid #1c1c1c;
        }

        .url-display { 
            background: #202124; 
            padding: 4px 12px; 
            border-radius: 12px; 
            flex-grow: 1; 
            margin: 0 10px; 
            user-select: none;
            color: #8ab4f8; /* Blue-ish like a link but unclickable */
        }

        #game-frame {
            width: 100%;
            height: calc(100% - 40px);
            border: none;
            background: #fff;
        }
    </style>
</head>
<body>

    <div class="app-header">
        <div style="width: 8px; height: 8px; border-radius: 50%; background: #27c93f; margin-right: 10px;"></div>
        <div class="url-display">🔒 translate.google.com/internal-module-144</div>
    </div>

    <iframe id="game-frame" src="https://translate.google.com/translate?sl=en&tl=es&u=https://geometry-spot.com/roblox/"></iframe>

</body>
</html>
